version: "3.9"

services:

  mongo:
    image: mongo:4.4
    container_name: mongo
    restart: always
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - app-network

  backend:
    build:
      context: ./Backend-springboot
    container_name: equiposynet-backend
    restart: always
    depends_on:
      - mongo
    env_file:
      - .env
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongo:27017/equiposynet_db
    ports:
      - "8080:8080"
    networks:
      - app-network

volumes:
  mongo_data:

networks:
  app-network:
